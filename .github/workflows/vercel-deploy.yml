name: Deploy to Vercel (Production)

# Manual, opt-in production deploy to Vercel.
# Trigger from the Actions tab ("Run workflow") or: gh workflow run vercel-deploy.yml
#
# One-time setup: add a repo secret named VERCEL_TOKEN
#   (create a token at https://vercel.com/account/tokens, then:
#    gh secret set VERCEL_TOKEN)
# The org/project IDs below are non-secret identifiers for the
# giffdevs-projects/unmatched-tracker project and are safe to commit.

on:
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_qymLK9gugmE5lSs2mxC5XqRY
  VERCEL_PROJECT_ID: prj_OSinwxVVIVAoBqFjTBl4JtpKRbw1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
